<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 하늘색 정사각형 배경 -->
  <rect width="100" height="100" rx="14" fill="#a4cee6"/>

  <!-- JDH: Sans-serif Bold -->
  <text
    x="50" y="50"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="26"
    font-weight="900"
    fill="#ffffff"
