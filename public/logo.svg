<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#5b8fb2" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- 하늘색 정사각형 배경 -->
  <rect x="4" y="4" width="112" height="112" rx="12" fill="#a4cee6" filter="url(#shadow)"/>

  <!-- JDH: Sans-serif Bold -->
  <text
    x="60" y="60"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="30"
    font-weight="900"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="1">JDH</text>

  <!-- PLANER: Serif, 대문자, 넓은 자간 -->
  <text
    x="60" y="86"
    font-family="'Times New Roman', Georgia, 'Noto Serif KR', serif"
    font-size="15"
    font-weight="500"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="3">PLANER</text>
</svg>
